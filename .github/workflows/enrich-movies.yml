name: Enrich Movies

on:
  push:
    branches: [main]
    paths: [movies.log]

permissions:
  contents: write

concurrency:
  group: enrich-movies
  cancel-in-progress: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fix recommender properties
        run: python scripts/fix_recommenders.py

      # Note: scripts/enrich_all.py is intentionally NOT run here.
      # IMDb enrichment is now opt-in per movie through the editor's
      # interactive picker (movies/edit-online.js → showImdbPicker).
      # That way a typo or ambiguous title never silently attaches the
      # wrong metadata.

      - name: Auto-cleanup (strip-imdb, normalize-keys, dedupe, route)
        run: python movies/movie cleanup --apply

      - name: Commit enriched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movies.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-enrich movies with IMDb data"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main..."
            git pull --rebase origin main || true
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1
