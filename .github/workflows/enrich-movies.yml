name: Enrich Movies

on:
  push:
    branches: [main]
    paths: [movies.log]

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fix recommender properties
        run: python scripts/fix_recommenders.py

      # Note: scripts/enrich_all.py is intentionally NOT run here.
      # IMDb enrichment is now opt-in per movie through the editor's
      # interactive picker (movies/edit-online.js → showImdbPicker).
      # That way a typo or ambiguous title never silently attaches the
      # wrong metadata.

      - name: Auto-cleanup (strip-imdb, normalize-keys, dedupe, route)
        run: python movies/movie cleanup --apply

      - name: Commit enriched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movies.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-enrich movies with IMDb data"
            git push
          fi
