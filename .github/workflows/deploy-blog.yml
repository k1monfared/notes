name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'blog/**'
      - 'movies/**'
      - 'movies.log'
      - '.github/workflows/deploy-blog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS media files only
        run: git lfs pull --include="*.png,*.jpg,*.jpeg,*.gif,*.svg,*.mp4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: blog/requirements.txt

      - name: Install dependencies
        run: pip install -r blog/requirements.txt

      - name: Build blog
        run: python blog/build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/blog
          cp -r blog/_site/* _deploy/blog/
          mkdir -p _deploy/movies
          cp movies/index.html _deploy/movies/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
