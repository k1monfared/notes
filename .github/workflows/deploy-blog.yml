name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'blog/**'
      - 'shared/**'
      - 'movies/**'
      - 'books/**'
      - 'people/**'
      - 'places/**'
      - 'podcasts/**'
      - 'products/**'
      - 'shopping/**'
      - '*.log'
      - '.github/workflows/deploy-blog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Pull LFS media files
        run: |
          git lfs install
          git lfs pull --include="*.png,*.jpg,*.jpeg,*.gif,*.svg,*.mp4" || echo "::warning::LFS pull failed — using cached blog build"
          git rev-parse HEAD > .lfs-assets-id

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: blog/requirements.txt

      - name: Install dependencies
        run: pip install -r blog/requirements.txt

      - name: Restore blog build cache
        id: blog-build-cache
        uses: actions/cache@v4
        with:
          path: |
            blog/_site
            blog/.build_cache.json
          key: blog-build-${{ hashFiles('blog/build.py', 'blog/templates/**', 'blog/static/**') }}-${{ hashFiles('blog/**/*.md') }}
          restore-keys: |
            blog-build-${{ hashFiles('blog/build.py', 'blog/templates/**', 'blog/static/**') }}-
            blog-build-

      - name: Force full blog rebuild if build tools changed
        if: steps.blog-build-cache.outputs.cache-hit != 'true'
        run: rm -f blog/.build_cache.json

      - name: Build blog
        run: python blog/build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/blog
          cp index.html _deploy/index.html
          cp -r blog/_site/* _deploy/blog/
          cp -r shared _deploy/shared
          cp *.log _deploy/
          for dir in movies books people places podcasts products shopping; do
            mkdir -p _deploy/$dir
            cp $dir/index.html _deploy/$dir/index.html
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
