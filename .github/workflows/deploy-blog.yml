name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'blog/**'
      - 'shared/**'
      - 'movies/**'
      - 'books/**'
      - 'people/**'
      - 'places/**'
      - 'podcasts/**'
      - 'products/**'
      - 'shopping/**'
      - '*.log'
      - 'blog-writer/**'
      - 'movie-writer/**'
      - '.github/workflows/deploy-blog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: blog/requirements.txt

      - name: Install dependencies
        run: pip install -r blog/requirements.txt

      - name: Restore blog build cache
        id: blog-build-cache
        uses: actions/cache@v4
        with:
          path: |
            blog/_site
            blog/.build_cache.json
            blog/.build_tools_hash
          key: blog-build-${{ hashFiles('blog/build.py', 'blog/templates/**', 'blog/static/**') }}-${{ hashFiles('blog/**/*.md') }}
          restore-keys: |
            blog-build-${{ hashFiles('blog/build.py', 'blog/templates/**', 'blog/static/**') }}-
            blog-build-

      - name: Force full rebuild only if build tools changed
        run: |
          TOOLS_HASH="${{ hashFiles('blog/build.py', 'blog/templates/**', 'blog/static/**') }}"
          if [ -f blog/.build_tools_hash ] && [ "$(cat blog/.build_tools_hash)" = "$TOOLS_HASH" ]; then
            echo "Build tools unchanged, keeping incremental cache"
          else
            echo "Build tools changed, forcing full rebuild"
            rm -f blog/.build_cache.json
          fi
          echo "$TOOLS_HASH" > blog/.build_tools_hash

      - name: Build blog
        run: python blog/build.py --cdn

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/blog
          cp index.html _deploy/index.html
          cp -r blog/_site/* _deploy/blog/
          cp -r shared _deploy/shared
          cp *.log _deploy/
          cp -r blog-writer _deploy/blog-writer
          cp -r movie-writer _deploy/movie-writer
          for dir in movies books people places podcasts products shopping; do
            mkdir -p _deploy/$dir
            cp $dir/index.html _deploy/$dir/index.html
            # Copy any sibling JS/CSS the page needs (e.g. movies/edit-online.js)
            for asset in $dir/*.js $dir/*.css; do
              [ -f "$asset" ] && cp "$asset" _deploy/$dir/
            done
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
