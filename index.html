<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes</title>
  <style>
    :root {
      --bg: #fff;
      --text: #222;
      --text-muted: #666;
      --link: #0366d6;
      --link-hover: #0550ae;
      --border: #e1e4e8;
      --header-bg: #fafbfc;
      --card-bg: #fafbfc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --text: #e0e0e0;
        --text-muted: #999;
        --link: #58a6ff;
        --link-hover: #79c0ff;
        --border: #30363d;
        --header-bg: #16213e;
        --card-bg: #16213e;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
    }
    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
    }
    h1 {
      margin: 2rem 0 1.5rem;
      font-size: 1.5rem;
    }
    .cards {
      display: grid;
      gap: 1rem;
    }
    .card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .card:hover {
      border-color: var(--link);
    }
    .card-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--link);
    }
    .card-desc {
      margin-top: 0.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/notes/">Notes</a>
    </div>
  </header>
  <main class="container">
    <h1>Notes</h1>
    <div class="cards">
      <a class="card" href="blog/">
        <div class="card-title">Blog</div>
        <div class="card-desc">Posts on math, tech, life, and everything in between.</div>
      </a>
      <a class="card" href="movies/">
        <div class="card-title">Movies</div>
        <div class="card-desc">A log of movies watched, rated, and reviewed.</div>
      </a>
    </div>
  </main>
</body>
</html>
