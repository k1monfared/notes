<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies</title>
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/base.css">
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/nav.css">
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/sidebar.css">
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/lightbox.css">
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/post-nav.css">
<script src="https://k1monfared.github.io/site_kit/js/theme.js"></script>
<style>
:root {
  --bg2:  var(--header-bg);
  --bg3:  var(--border);
  --bd:   var(--border);
  --txt:  var(--text);
  --txt2: var(--text-muted);
  --acc:  var(--link);
  --green:#4caf50;
  --blue: var(--link);
  --ora:  #ff9800;
  --red:  #f44336;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--txt2); }
* { scrollbar-width: thin; scrollbar-color: var(--bd) transparent; }
body { background: var(--bg); color: var(--txt); font-family: system-ui,-apple-system,sans-serif; font-size: 15px; line-height: 1.5; }

/* ── Header ── */
#hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--bd);
  padding: 10px 14px 8px;
}
.title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
#hdr h1 { font-size: 1.25rem; color: var(--acc); letter-spacing: .5px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.hdr-icon-btn {
  background: transparent; border: none; padding: 6px; cursor: pointer;
  color: var(--txt2); border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
}
.hdr-icon-btn:hover { color: var(--txt); background: var(--bg2); }
.hdr-icon-btn svg { display: block; }
.search-row { display: flex; gap: 8px; align-items: center; }
#search {
  flex: 1; padding: 7px 12px;
  border-radius: 8px; border: 1px solid var(--bd);
  background: var(--bg2); color: var(--txt); font-size: 14px;
}
#search:focus { outline: none; border-color: var(--acc); }

/* ── Root tabs ── */
#tabs {
  display: flex; border-bottom: 2px solid var(--bd);
  background: var(--bg);
}
.tab {
  padding: 8px 18px; cursor: pointer; color: var(--txt2); font-size: 13px;
  font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all .15s;
}
.tab:hover { color: var(--txt); }
.tab.on { color: var(--acc); border-bottom-color: var(--acc); }

/* ── Stats ── */
#stats { padding: 5px 14px; color: var(--txt2); font-size: 12px; border-bottom: 1px solid var(--bd); }

/* ── Section ── */
.sec { border-bottom: 1px solid var(--bd); }
.sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; cursor: pointer; background: var(--bg2); user-select: none;
}
.sec.open > .sec-hdr {
  position: sticky; top: var(--hdr-h, 80px); z-index: 10;
}
.sec-hdr:hover { background: var(--bg3); }
.sec-title { font-weight: 600; font-size: .9rem; }
.sec-meta { display: flex; align-items: center; gap: 8px; color: var(--txt2); font-size: 12px; }
.arr { color: var(--txt2); font-size: 11px; transition: transform .2s; }
.sec.open > .sec-hdr .arr { transform: rotate(90deg); }
.sec-body { display: none; }
.sec.open > .sec-body { display: block; }

/* Tier colors */
[data-t="1"] .sec-title { color: #f9c74f; }
[data-t="2"] .sec-title { color: #90be6d; }
[data-t="3"] .sec-title { color: #43aa8b; }
[data-t="4"] .sec-title { color: #4d908e; }
[data-t="5"] .sec-title { color: #577590; }
[data-t="6"] .sec-title { color: #999; }
[data-t="7"] .sec-title { color: var(--ora); }
[data-t="8"] .sec-title { color: var(--red); }

/* ── Subsection ── */
.subsec { border-bottom: 1px solid var(--bd); }
.subsec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px 6px 28px; cursor: pointer; background: var(--bg);
  user-select: none;
}
.subsec.open > .subsec-hdr {
  position: sticky; top: var(--hdr-sec-h, 120px); z-index: 9;
}
.subsec-hdr:hover { background: var(--bg2); }
.subsec-title {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: .8px; color: var(--acc); font-weight: 600;
}
.subsec-meta { display: flex; align-items: center; gap: 8px; color: var(--txt2); font-size: 12px; }
.subsec .arr { color: var(--txt2); font-size: 10px; transition: transform .2s; }
.subsec.open > .subsec-hdr .arr { transform: rotate(90deg); }
.subsec-body { display: none; }
.subsec.open .subsec-body { display: block; }

/* ── Movie ── */
.mv { border-bottom: 1px solid var(--bd); }
.mv-hdr {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 14px; cursor: pointer;
}
.mv-hdr:hover { background: var(--bg2); }
.si { flex-shrink: 0; font-size: 14px; margin-top: 3px; }
.si.watched    { color: var(--green); }
.si.unwatched  { color: var(--txt2); }
.si.skipped    { color: var(--txt2); opacity: 0.6; }
.si.uncertain  { color: var(--txt2); }
.mv-info { flex: 1; min-width: 0; }
.mv-name { font-weight: 500; }
.mv-sub { font-size: 12px; color: var(--txt2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mv-toggle { flex-shrink: 0; color: var(--txt2); font-size: 14px; margin-top: 3px; width: 16px; text-align: center; }
.mv.open .mv-toggle::after { content: '−'; }
.mv:not(.open) .mv-toggle::after { content: '+'; }

/* ── Movie detail ── */
.mv-detail {
  display: none; padding: 10px 14px 14px 37px;
  background: var(--bg2); border-top: 1px solid var(--bd);
}
.mv.open .mv-detail { display: block; }
.review { margin-bottom: 10px; line-height: 1.6; font-size: 14px; border-left: 3px solid var(--acc); padding-left: 10px; }
.review-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--acc); font-weight: 600; margin-bottom: 3px; }
.review-text { color: var(--txt); }
.dg { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; font-size: 13px; }
.dk { color: var(--txt2); white-space: nowrap; }
.dv { color: var(--txt); }
.recommended-by { font-size: 13px; color: var(--txt2); margin-bottom: 10px; }
.recommended-by .rec-name { color: var(--txt); font-weight: 500; }
.imdb-link { display: inline-block; margin-top: 8px; color: var(--blue); font-size: 13px; text-decoration: none; }
.imdb-link:hover { text-decoration: underline; }

/* Edit-mode controls (only visible when body.edit-mode is set) */
.edit-only { display: none !important; }
body.edit-mode .edit-only { display: inline-flex !important; }
.mv-edit-btn {
  background: transparent; border: 1px solid var(--bd); color: var(--txt2);
  padding: 3px 6px; border-radius: 4px; cursor: pointer;
  margin-left: 6px; flex-shrink: 0;
  transition: color .15s, border-color .15s;
}
.mv-edit-btn:hover { color: var(--acc); border-color: var(--acc); }
.mv-edit-btn svg { display: block; }
body.edit-mode #edit-lock { color: var(--green); }
body.edit-mode .lock-closed { display: none; }
.lock-open { display: none; }
body.edit-mode .lock-open { display: block; }

/* ── Enrich button ── */
.enrich-btn {
  display: inline-block; margin-top: 8px; padding: 4px 12px;
  border-radius: 4px; border: 1px solid var(--acc); background: transparent;
  color: var(--acc); cursor: pointer; font-size: 12px; transition: all .15s;
}
.enrich-btn:hover { background: var(--acc); color: #000; }
.enrich-btn:disabled { opacity: .5; cursor: default; }
.enrich-result {
  margin-top: 10px; padding: 10px; background: var(--bg3);
  border: 1px solid var(--bd); border-radius: 6px;
}
.enrich-result .dg { margin-bottom: 8px; }
.enrich-copy {
  display: flex; gap: 8px; align-items: center; margin-top: 8px;
}
.enrich-copy button {
  padding: 4px 12px; border-radius: 4px; border: 1px solid var(--green);
  background: transparent; color: var(--green); cursor: pointer; font-size: 12px;
}
.enrich-copy button:hover { background: var(--green); color: #000; }
.enrich-copy .copied { font-size: 11px; color: var(--green); }
.enrich-pre {
  margin-top: 6px; padding: 8px; background: var(--bg); border: 1px solid var(--bd);
  border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--txt2);
  white-space: pre; overflow-x: auto; max-height: 200px;
}

/* ── Loading / empty ── */
.center { text-align: center; padding: 50px 20px; color: var(--txt2); }
.err { color: var(--red); }

/* ── Filter toggle button ── */
#filter-toggle {
  background: var(--bg2); border: 1px solid var(--bd); color: var(--txt2);
  padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  white-space: nowrap; flex-shrink: 0;
}
#filter-toggle:hover { border-color: var(--acc); color: var(--txt); }
#filter-toggle.on { color: var(--acc); border-color: var(--acc); }

/* ── Sidebar ── */
#sidebar {
  position: fixed; top: 0; right: 0; bottom: 0; width: 300px;
  background: var(--bg); border-left: 1px solid var(--bd);
  z-index: 200; transform: translateX(100%); transition: transform .2s;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar.open { transform: translateX(0); }
#sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 199; display: none;
}
#sidebar-overlay.open { display: block; }

.sb-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; border-bottom: 1px solid var(--bd); flex-shrink: 0;
}
.sb-header h2 { font-size: 1rem; color: var(--acc); }
.sb-close {
  background: none; border: none; color: var(--txt2); font-size: 20px;
  cursor: pointer; padding: 0 4px;
}
.sb-close:hover { color: var(--txt); }

.sb-body { flex: 1; overflow-y: auto; padding: 14px; }

.sb-section { margin-bottom: 20px; }
.sb-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
  color: var(--acc); font-weight: 600; margin-bottom: 8px;
}

/* Toggle filters */
.sb-toggles { display: flex; flex-direction: column; gap: 6px; }
.sb-toggle-label { font-size: 12px; color: var(--txt2); margin-top: 4px; }
.sb-toggle-row { display: flex; gap: 4px; }
.sb-tbtn {
  padding: 4px 14px; border-radius: 4px; border: 1px solid var(--bd);
  background: var(--bg2); color: var(--txt2); cursor: pointer; font-size: 12px;
  transition: all .15s;
}
.sb-tbtn:hover { border-color: var(--acc); color: var(--txt); }
.sb-tbtn.on { background: var(--acc); color: #000; border-color: var(--acc); font-weight: 600; }

/* Genre actions */
.sb-actions { display: flex; gap: 6px; margin-bottom: 8px; }
.sb-action {
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--bd);
  background: var(--bg2); color: var(--txt2); cursor: pointer; font-size: 11px;
}
.sb-action:hover { border-color: var(--acc); color: var(--txt); }

/* Genre list */
.sb-genres { max-height: 320px; overflow-y: auto; }
.sb-genre {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; cursor: pointer; font-size: 13px; color: var(--txt);
}
.sb-genre input[type="checkbox"] { accent-color: var(--acc); flex-shrink: 0; }
.sb-genre-count { margin-left: auto; color: var(--txt2); font-size: 11px; }

/* ── Dual range slider ── */
.range-wrap { position: relative; height: 36px; margin-top: 8px; }
.range-track {
  position: absolute; top: 16px; left: 0; right: 0; height: 4px;
  background: var(--bg3); border-radius: 2px;
}
.range-fill {
  position: absolute; top: 16px; height: 4px;
  background: var(--acc); border-radius: 2px;
}
.range-wrap input[type="range"] {
  position: absolute; top: 8px; width: 100%; height: 20px;
  -webkit-appearance: none; appearance: none;
  background: transparent; pointer-events: none; margin: 0;
}
.range-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--acc); border: 2px solid var(--bg);
  cursor: pointer; pointer-events: auto;
}
.range-wrap input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--acc); border: 2px solid var(--bg);
  cursor: pointer; pointer-events: auto;
}
.range-labels {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--txt2); margin-top: 4px;
}
.range-labels span { color: var(--txt); font-weight: 500; }

@media(max-width:500px) {
  .dg { grid-template-columns: 1fr; }
  .dk { font-size: 11px; color: var(--acc); margin-top: 4px; }
  #sidebar { width: 100%; }
}

/* ── Editor dialog (modals from edit-online.js) ── */
.editor-dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
}
.editor-dialog {
  background: var(--bg); border: 1px solid var(--bd); border-radius: 10px;
  padding: 18px 18px 14px; width: 100%; max-width: 420px;
  box-shadow: 0 8px 30px rgba(0,0,0,.3);
  max-height: 90vh; overflow-y: auto;
}
.editor-dialog.editor-dialog-wide { max-width: 540px; }
.editor-dialog h3 { color: var(--acc); margin-bottom: 8px; font-size: 1.1rem; }
.editor-dialog .dialog-hint {
  font-size: 13px; color: var(--txt2); margin-bottom: 12px; line-height: 1.5;
}
.editor-dialog .dialog-hint code {
  background: var(--bg2); padding: 1px 5px; border-radius: 4px; font-size: 12px;
}
.editor-dialog input,
.editor-dialog textarea,
.editor-dialog select {
  width: 100%; padding: 7px 10px; border: 1px solid var(--bd);
  background: var(--bg2); color: var(--txt);
  border-radius: 6px; font-size: 14px; font-family: inherit;
}
.editor-dialog textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.editor-dialog input:focus,
.editor-dialog textarea:focus,
.editor-dialog select:focus { outline: none; border-color: var(--acc); }
.editor-dialog .dialog-grid {
  display: grid; grid-template-columns: 100px 1fr; gap: 8px 10px;
  margin-bottom: 12px; align-items: start;
}
.editor-dialog .dialog-grid label {
  font-size: 12px; color: var(--txt2); font-weight: 600; padding-top: 8px;
  text-transform: uppercase; letter-spacing: 0.03em;
}
.editor-dialog .dialog-error {
  color: var(--red); font-size: 12px; min-height: 16px; margin-bottom: 8px;
}
.editor-dialog .dialog-actions {
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid var(--bd); padding-top: 10px;
}
.editor-dialog .dialog-actions button {
  padding: 7px 14px; border: 1px solid var(--bd); border-radius: 6px;
  background: var(--bg); color: var(--txt); font-size: 13px; cursor: pointer;
}
.editor-dialog .dialog-actions button.btn-primary {
  background: var(--acc); color: var(--bg); border-color: var(--acc);
}
.editor-dialog .dialog-actions button.btn-danger {
  background: var(--red); color: white; border-color: var(--red);
}
.editor-dialog .dialog-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Toast ── */
.editor-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); color: var(--txt);
  border: 1px solid var(--bd); border-radius: 6px;
  padding: 9px 16px; font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  opacity: 0; pointer-events: none; transition: opacity .2s;
  z-index: 300; cursor: pointer;
}
.editor-toast.visible { opacity: 1; pointer-events: auto; }
.editor-toast.toast-error { border-color: var(--red); color: var(--red); }
@media(max-width:500px) {
  .editor-dialog .dialog-grid { grid-template-columns: 1fr; gap: 4px; }
  .editor-dialog .dialog-grid label { padding-top: 8px; }
}
</style>
</head>
<body>

<div id="hdr">
  <div class="title-row">
    <h1>Movies</h1>
    <div class="hdr-actions">
      <button id="edit-lock" class="hdr-icon-btn" aria-label="Edit mode" title="Edit mode">
        <svg class="lock-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <svg class="lock-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
      </button>
    </div>
  </div>
  <div class="search-row">
    <input type="search" id="search" placeholder="Search… (genre:comedy, director:nolan, title:dark, review:brilliant)" autocomplete="off">
    <button id="filter-toggle" onclick="toggleSidebar()">Filters</button>
  </div>
</div>
<div id="tabs"></div>
<div id="stats"></div>
<div id="content"><div class="center">Loading movies…</div></div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="sb-header">
    <h2>Filters</h2>
    <button class="sb-close" onclick="toggleSidebar()">×</button>
  </div>
  <div class="sb-body">
    <div class="sb-section">
      <div class="sb-section-title">IMDB Rating</div>
      <div class="range-wrap">
        <div class="range-track"></div>
        <div class="range-fill" id="range-fill"></div>
        <input type="range" id="rating-min" min="0" max="10" step="0.1" value="0">
        <input type="range" id="rating-max" min="0" max="10" step="0.1" value="10">
      </div>
      <div class="range-labels">
        <span id="rating-min-label">0</span>
        <span id="rating-max-label">10</span>
      </div>
      <label class="sb-genre" style="margin-top:8px">
        <input type="checkbox" id="include-unrated" checked onchange="includeUnrated=this.checked;render()">
        <span>Include unrated movies</span>
      </label>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Status</div>
      <div class="sb-toggles">
        <label class="sb-toggle-label">Watched</label>
        <div class="sb-toggle-row" id="watched-filter">
          <button class="sb-tbtn on" data-v="all" onclick="setFilter('watched','all',this)">All</button>
          <button class="sb-tbtn" data-v="yes" onclick="setFilter('watched','yes',this)">Yes</button>
          <button class="sb-tbtn" data-v="no" onclick="setFilter('watched','no',this)">No</button>
        </div>
        <label class="sb-toggle-label">Reviewed</label>
        <div class="sb-toggle-row" id="reviewed-filter">
          <button class="sb-tbtn on" data-v="all" onclick="setFilter('reviewed','all',this)">All</button>
          <button class="sb-tbtn" data-v="yes" onclick="setFilter('reviewed','yes',this)">Yes</button>
          <button class="sb-tbtn" data-v="no" onclick="setFilter('reviewed','no',this)">No</button>
        </div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Genres</div>
      <div class="sb-actions">
        <button class="sb-action" onclick="genreSelectAll()">All</button>
        <button class="sb-action" onclick="genreSelectNone()">None</button>
        <button class="sb-action" onclick="genreInvert()">Invert</button>
      </div>
      <div class="sb-genres" id="genre-list"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
// Sources tried in order. Production prefers raw (always-fresh) but falls
// back to the same-origin copy so the page still loads if raw is blocked
// or rate-limited.
const SOURCES = isLocalHost
  ? ['/movies.log']
  : ['https://raw.githubusercontent.com/k1monfared/notes/main/movies.log', '../movies.log'];

async function fetchMoviesLog() {
  let lastErr;
  for (const url of SOURCES) {
    try {
      const resp = await fetch(url, { cache: 'no-store' });
      if (resp.ok) return resp.text();
      lastErr = new Error(`HTTP ${resp.status} from ${url}`);
    } catch (err) {
      lastErr = err;
    }
  }
  throw lastErr || new Error('No source available');
}

// ── Parser ───────────────────────────────────────────────────────────────────

function spaces(line) {
  let n = 0; while (n < line.length && line[n] === ' ') n++; return n;
}

function parseTodo(tr) {
  const m = tr.match(/^\[([x\-? ]?)\]\s*(.*)/i);
  if (!m) return null;
  const ch = (m[1] || '').toLowerCase().trim();
  return {
    status: ch === 'x' ? 'watched' : ch === '-' ? 'skipped' : ch === '?' ? 'uncertain' : 'unwatched',
    title: m[2].trim()
  };
}

function isTodo(tr) { return /^\[[x\-? ]?\]/i.test(tr); }

// Walk every movie in a group tree, yielding each with its enclosing groups.
function* walkMovies(groups) {
  for (const g of groups) {
    for (const m of g.movies) yield m;
    yield* walkMovies(g.children);
  }
}

function parseLog(text) {
  const lines = text.split('\n');
  // Each Group: { name, depth, indent, movies: [], children: [] }
  // The data is a forest of top-level groups (depth 0); tabs render those.
  // A Group can hold movies AND child groups; no "category must exist" rule.
  const roots = [];
  // Stack of groups currently in scope, sorted by ascending indent.
  // stack[0] is the top-level group containing the cursor.
  const stack = [];

  let mov = null, movInd = -1, lastKey = null, collecting = null;

  function finishMov() { mov = null; movInd = -1; lastKey = null; collecting = null; }

  function popTo(indent) {
    // Pop groups whose indent >= the line's indent (so we can attach a child).
    while (stack.length && stack[stack.length - 1].indent >= indent) stack.pop();
  }

  function pushGroup(name, indent) {
    const parent = stack.length ? stack[stack.length - 1] : null;
    const g = { name, indent, depth: parent ? parent.depth + 1 : 0, movies: [], children: [] };
    if (parent) parent.children.push(g);
    else roots.push(g);
    stack.push(g);
    return g;
  }

  function addProp(rawKey, val) {
    if (!mov) return;
    const key = rawKey.toLowerCase().trim();
    const v   = val.trim();
    const p   = mov.props;

    if (key === 'imdb' || key === 'imdb link' || key === 'link') {
      if (!p.imdb && (v.startsWith('http') || v.toLowerCase() === 'n/a')) p.imdb = v;
    } else if (key === 'imdb rating') {
      p.rating = p.rating || v;
    } else if (key === 'year') {
      p.year = p.year || v;
    } else if (key === 'genres' || key === 'genre') {
      p.genres = p.genres || v;
    } else if (key === 'country') {
      p.country = p.country || v;
    } else if (key === 'duration') {
      p.duration = p.duration || v;
    } else if (key === 'released') {
      p.released = p.released || v;
    } else if (key === 'synopsis') {
      p.synopsis = p.synopsis || v;
    } else if (key.includes('director')) {
      p.director = p.director ? p.director + ', ' + v : v;
      collecting = v ? null : 'director';
    } else if (key === 'cast') {
      if (!p.cast) p.cast = [];
      collecting = 'cast';
    } else if (['recommender','recommended by','recommmender','receommender','recommender by'].includes(key)) {
      p.recommender = p.recommender ? p.recommender + ', ' + v : v;
    } else if (key === 'review') {
      p.review = p.review || v || '';
      if (!v) collecting = 'review';
    } else if (key === 'because of') {
      p.becauseOf = v;
    } else if (key === 'tag') {
      p.tag = v;
    }
    // always update lastKey
    lastKey = key;
  }

  function handleSubItem(inner) {
    // Called for "- <inner>" lines deeper than the standard prop indent
    if (!mov) return;
    const p = mov.props;
    if (collecting === 'cast' || lastKey === 'cast') {
      if (!p.cast) p.cast = [];
      if (!inner.includes(':')) p.cast.push(inner.trim());
    } else if (collecting === 'review') {
      p.review = p.review ? p.review + ' ' + inner.trim() : inner.trim();
    } else if (collecting === 'director') {
      p.director = p.director ? p.director + ', ' + inner.trim() : inner.trim();
    }
  }

  for (const raw of lines) {
    const ind = spaces(raw);
    const tr  = raw.trim();
    if (!tr) continue;

    // Group header: "- name" (or "- name:") that is NOT a todo, at any indent.
    // We close any movie deeper than this header before opening a new group.
    if (tr.startsWith('- ') && !isTodo(tr.slice(2))) {
      // If this header is at or above the current movie's indent, the movie's done.
      if (mov && ind <= movInd) finishMov();
      // Only treat as a group header when not inside a movie's property scope.
      if (!mov || ind <= movInd) {
        popTo(ind);
        const name = tr.slice(2).replace(/:$/, '').trim();
        pushGroup(name, ind);
        continue;
      }
      // else: it's a property-style "- key: value" handled below
    }

    // Todo line → movie, attached to the deepest enclosing group.
    if (isTodo(tr)) {
      const parsed = parseTodo(tr);
      if (!parsed) continue;
      // The movie's parent is the deepest group with indent < this line's indent.
      popTo(ind);
      const parent = stack.length ? stack[stack.length - 1] : null;
      if (!parent) continue;  // top-level movie with no enclosing group — skip
      // Build legacy section/subsection labels from the group path for search/filters.
      const path = stack.map(g => g.name);
      mov = {
        status: parsed.status,
        title: parsed.title,
        indent: ind,
        rootSection: path[0] || '',
        section: path[1] || path[0] || '',
        subsection: path[2] || null,
        props: {}
      };
      movInd = ind; lastKey = null; collecting = null;
      parent.movies.push(mov);
      continue;
    }

    // Properties of the current movie
    if (mov && ind > movInd) {
      const propInd = movInd + 4;

      if (ind === propInd) {
        if (tr.startsWith('- ')) {
          const inner = tr.slice(2);
          const ci = inner.indexOf(':');
          if (ci > 0) {
            const key = inner.slice(0, ci);
            const val = inner.slice(ci + 1);
            // Standalone URL line like "- https://..."
            if (key.trimStart().toLowerCase().startsWith('http')) {
              mov.props.imdb = mov.props.imdb || (key.trim() + ':' + val);
            } else {
              addProp(key, val);
              if (val.trim()) collecting = null;
            }
          } else {
            // No colon → sub-item or freetext note
            if (collecting === 'cast') {
              if (!mov.props.cast) mov.props.cast = [];
              mov.props.cast.push(inner.trim());
            } else if (collecting === 'review') {
              mov.props.review = mov.props.review ? mov.props.review + ' ' + inner.trim() : inner.trim();
            } else {
              // Generic note (e.g. "- A nicely made musical love story.")
              mov.props.notes = mov.props.notes ? mov.props.notes + ' ' + inner.trim() : inner.trim();
            }
          }
        } else {
          // Non-standard "key: value" (no leading "- ", used in some TIFF entries)
          const ci = tr.indexOf(':');
          if (ci > 0 && !tr.startsWith('http')) {
            addProp(tr.slice(0, ci), tr.slice(ci + 1));
          }
        }

      } else if (ind > propInd) {
        // Sub-property (cast members, multi-line review, multi-director, etc.)
        if (tr.startsWith('- ')) {
          handleSubItem(tr.slice(2));
        } else {
          // Deeper non-standard property line
          const ci = tr.indexOf(':');
          if (ci > 0 && !tr.startsWith('http')) {
            addProp(tr.slice(0, ci), tr.slice(ci + 1));
          }
        }
      }
    }
  }

  return roots;
}

// ── App state ────────────────────────────────────────────────────────────────

let data  = [];   // forest of top-level Group nodes (one per tab)
let rootI = 0;
let sfilt = 'all';
let sq    = '';
const movieMap = new Map(); // id -> movie object
let movieIdCounter = 0;
let selectedGenres = new Set(); // empty = all selected (before init)
let allGenres = [];             // sorted list of all genres
let ratingMin = 0;
let ratingMax = 10;
let includeUnrated = true;
let watchedFilter = 'all';   // 'all', 'yes', 'no'
let reviewedFilter = 'all';  // 'all', 'yes', 'no'

// ── Helpers ──────────────────────────────────────────────────────────────────

const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

const TIERS = [
  'i highly recommend',
  'i recommend',
  "i think it's a nice one",
  "there's something in it",
  'good entertainment',
  "i've watched it",
  'not a good one',
  'i highly discourage'
];

function tier(name) {
  const n = name.toLowerCase();
  const i = TIERS.findIndex(t => n.startsWith(t));
  return i >= 0 ? i + 1 : 0;
}

function parseGenres(m) {
  if (!m.props.genres) return [];
  return m.props.genres.split(/[,\/]/).map(g => g.trim().toLowerCase()).filter(Boolean);
}

function parseRating(m) {
  if (!m.props.rating) return null;
  const n = parseFloat(m.props.rating);
  return isNaN(n) ? null : n;
}

function matches(m) {
  if (sfilt !== 'all' && m.status !== sfilt) return false;

  // Watched filter
  if (watchedFilter === 'yes' && m.status !== 'watched') return false;
  if (watchedFilter === 'no' && m.status === 'watched') return false;

  // Reviewed filter
  if (reviewedFilter === 'yes' && !m.props.review && !m.props.notes) return false;
  if (reviewedFilter === 'no' && (m.props.review || m.props.notes)) return false;

  // Genre filter
  if (selectedGenres.size < allGenres.length) {
    const mg = parseGenres(m);
    if (mg.length && !mg.some(g => selectedGenres.has(g))) return false;
  }

  // Rating filter
  const r = parseRating(m);
  if (r === null) {
    if (!includeUnrated) return false;
  } else {
    if (r < ratingMin || r > ratingMax) return false;
  }

  if (!sq) return true;
  return advancedSearch(m, sq);
}

function parseMovieSearchQuery(query) {
  const filters = [];
  let freeText = '';
  const fieldRe = /(\w+):"([^"]+)"|(\w+):(\S+)/g;
  let lastEnd = 0;
  let match;
  while ((match = fieldRe.exec(query)) !== null) {
    const before = query.slice(lastEnd, match.index).trim();
    if (before) freeText += (freeText ? ' ' : '') + before;
    lastEnd = match.index + match[0].length;
    const field = (match[1] || match[3]).toLowerCase();
    const value = (match[2] || match[4]).toLowerCase();
    filters.push({ field, value });
  }
  const remaining = query.slice(lastEnd).trim();
  if (remaining) freeText += (freeText ? ' ' : '') + remaining;
  return { filters, freeText: freeText.toLowerCase() };
}

function advancedSearch(m, query) {
  const { filters, freeText } = parseMovieSearchQuery(query);
  const p = m.props;
  const fieldMap = {
    title: m.title,
    name: m.title,
    director: p.director,
    genre: p.genres,
    genres: p.genres,
    country: p.country,
    year: p.year,
    review: [p.review, p.notes].filter(Boolean).join(' '),
    rating: p.rating,
    cast: (p.cast || []).join(' '),
    synopsis: p.synopsis,
    tag: p.tag,
    recommender: p.recommender,
    section: m.section,
    duration: p.duration,
  };
  for (const { field, value } of filters) {
    const content = (fieldMap[field] || '').toLowerCase();
    if (!content || !content.includes(value)) return false;
  }
  if (freeText) {
    const hay = [
      m.title, m.section, m.subsection,
      p.director, p.review, p.notes,
      p.country, p.genres, p.recommender,
      p.year, p.synopsis, p.tag,
      (p.cast || []).join(' ')
    ].filter(Boolean).join(' ').toLowerCase();
    if (!hay.includes(freeText)) return false;
  }
  return true;
}

// ── Render ───────────────────────────────────────────────────────────────────

function siIcon(status) {
  const icons = { watched: '✓', unwatched: '○', skipped: '✗', uncertain: '?' };
  return `<span class="si ${status}">${icons[status] || '○'}</span>`;
}

function movieDetail(m) {
  const p = m.props;
  let h = '';

  const review = p.review || p.notes;
  if (review) h += `<div class="review"><div class="review-label">My review</div><div class="review-text">${esc(review)}</div></div>`;
  if (p.recommender) h += `<div class="recommended-by">Recommended by <span class="rec-name">${esc(p.recommender)}</span></div>`;

  const rows = [];
  if (p.director)   rows.push(['Director',    esc(p.director)]);
  if (p.year)       rows.push(['Year',         esc(p.year)]);
  if (p.rating)     rows.push(['IMDB',         esc(p.rating.replace('/10',''))]);
  if (p.genres)     rows.push(['Genres',       esc(p.genres)]);
  if (p.country)    rows.push(['Country',      esc(p.country)]);
  if (p.duration)   rows.push(['Duration',     esc(p.duration)]);
  if (p.released)   rows.push(['Released',     esc(p.released.replace(/.*(\d{4}).*/, '$1'))]);
  if (p.becauseOf)  rows.push(['Because of',   esc(p.becauseOf)]);
  const castStr = (p.cast || []).slice(0,5).join(', ');
  if (castStr)      rows.push(['Cast',         esc(castStr)]);
  if (p.synopsis)   rows.push(['Synopsis',     esc(p.synopsis)]);

  if (rows.length) {
    h += `<div class="dg">`;
    for (const [k, v] of rows)
      h += `<div class="dk">${k}</div><div class="dv">${v}</div>`;
    h += `</div>`;
  }

  const url = p.imdb && p.imdb.startsWith('http') ? p.imdb : null;
  if (url) h += `<a class="imdb-link" href="${esc(url)}" target="_blank" rel="noopener">View on IMDB ↗</a>`;

  if (needsEnrichment(m)) h += `<button class="enrich-btn" onclick="enrichMovie(this, movieRef(this))">Fetch IMDb info</button>`;

  if (!h) h = '<div class="synopsis">No additional details available.</div>';
  return h;
}

function buildMovieEl(m) {
  const id = movieIdCounter++;
  movieMap.set(id, m);

  const div = document.createElement('div');
  div.className = 'mv';
  div.dataset.mid = id;

  const year = m.props.year ? `${m.props.year}` : '';
  const dir  = m.props.director ? m.props.director.split(',')[0].trim() : '';
  const sub  = [year, dir].filter(Boolean).join(' · ');
  div.innerHTML = `
    <div class="mv-hdr" onclick="toggleMv(this.parentElement)">
      ${siIcon(m.status)}
      <div class="mv-info">
        <div class="mv-name">${esc(m.title)}</div>
        ${sub ? `<div class="mv-sub">${esc(sub)}</div>` : ''}
      </div>
      <button class="mv-edit-btn edit-only" data-action="edit-movie" title="Edit movie" aria-label="Edit movie">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      </button>
      <span class="mv-toggle"></span>
    </div>
    <div class="mv-detail">${movieDetail(m)}</div>`;
  return div;
}

function movieRef(el) {
  const mv = el.closest('.mv');
  return movieMap.get(Number(mv.dataset.mid));
}

// Count matching movies recursively in a group (direct + descendants).
function countMatches(group) {
  let n = group.movies.filter(matches).length;
  for (const c of group.children) n += countMatches(c);
  return n;
}

// Count watched (status === 'watched') movies recursively, ignoring filters.
function countWatched(group) {
  let n = group.movies.filter(m => m.status === 'watched').length;
  for (const c of group.children) n += countWatched(c);
  return n;
}

// Render a Group as either a top-level container (level 0, no header — the tab IS the header)
// or as a collapsible section (.sec for level 1, .subsec for level 2+).
function buildGroup(group, level) {
  const matchedMovies = group.movies.filter(matches);
  const total = countMatches(group);
  if (!total) return null;

  // Level 0: render directly into a fragment, no surrounding section wrapper.
  if (level === 0) {
    const frag = document.createDocumentFragment();
    for (const m of matchedMovies) frag.appendChild(buildMovieEl(m));
    for (const child of group.children) {
      const el = buildGroup(child, 1);
      if (el) frag.appendChild(el);
    }
    return frag;
  }

  const watched = countWatched(group);
  const t = tier(group.name);

  const isTop = level === 1;
  const wrapClass = isTop ? 'sec' : 'subsec';
  const hdrClass  = isTop ? 'sec-hdr' : 'subsec-hdr';
  const titleClass= isTop ? 'sec-title' : 'subsec-title';
  const metaClass = isTop ? 'sec-meta' : 'subsec-meta';
  const bodyClass = isTop ? 'sec-body' : 'subsec-body';

  const wrap = document.createElement('div');
  wrap.className = wrapClass;
  if (t) wrap.dataset.t = t;

  wrap.innerHTML = `
    <div class="${hdrClass}" onclick="toggleSec(this.parentElement)">
      <div class="${titleClass}">${esc(group.name)}</div>
      <div class="${metaClass}">
        <span>${total}</span>
        ${watched ? `<span style="color:var(--green)">${watched}✓</span>` : ''}
        <span class="arr">▶</span>
      </div>
    </div>
    <div class="${bodyClass}"></div>`;

  const body = wrap.querySelector('.' + bodyClass);
  for (const m of matchedMovies) body.appendChild(buildMovieEl(m));
  for (const child of group.children) {
    const el = buildGroup(child, level + 1);
    if (el) body.appendChild(el);
  }
  return wrap;
}

function render() {
  if (!data.length) return;
  movieMap.clear();
  movieIdCounter = 0;
  const content = document.getElementById('content');
  content.innerHTML = '';

  const rootGroup = data[rootI];
  if (!rootGroup) return;

  const total = countMatches(rootGroup);
  const frag = buildGroup(rootGroup, 0);
  if (frag) content.appendChild(frag);

  document.getElementById('stats').textContent =
    `${total} movie${total !== 1 ? 's' : ''}${sq ? ` matching "${sq}"` : ''}`;

  if (!total) {
    content.innerHTML = '<div class="center">No movies found.</div>';
  }
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  data.forEach((rs, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === rootI ? ' on' : '');
    tab.textContent = rs.name;
    tab.onclick = () => {
      rootI = i;
      document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('on', j === i));
      render();
    };
    el.appendChild(tab);
  });
}

// ── Interactions ─────────────────────────────────────────────────────────────

function toggleSec(el) { el.classList.toggle('open'); }
function toggleMv(el)  { el.classList.toggle('open'); }

// ── Sidebar ──────────────────────────────────────────────────────────────────

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
  document.getElementById('filter-toggle').classList.toggle('on');
}

function setFilter(type, value, btn) {
  if (type === 'watched') watchedFilter = value;
  else if (type === 'reviewed') reviewedFilter = value;
  btn.parentElement.querySelectorAll('.sb-tbtn').forEach(b => b.classList.toggle('on', b === btn));
  render();
}

function genreCounts() {
  const counts = new Map();
  for (const m of walkMovies(data)) {
    for (const g of parseGenres(m)) {
      counts.set(g, (counts.get(g) || 0) + 1);
    }
  }
  return counts;
}

function collectGenres() {
  const counts = genreCounts();
  allGenres = [...counts.keys()].sort();
  selectedGenres = new Set(allGenres);
  renderGenres(counts);
}

function renderGenres(counts) {
  const el = document.getElementById('genre-list');
  if (!counts) counts = genreCounts();
  el.innerHTML = '';
  for (const g of allGenres) {
    const label = document.createElement('label');
    label.className = 'sb-genre';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = selectedGenres.has(g);
    cb.addEventListener('change', () => {
      if (cb.checked) selectedGenres.add(g);
      else selectedGenres.delete(g);
      render();
    });
    const name = document.createElement('span');
    name.textContent = g;
    const count = document.createElement('span');
    count.className = 'sb-genre-count';
    count.textContent = counts.get(g) || 0;
    label.append(cb, name, count);
    el.appendChild(label);
  }
}

function genreSelectAll() {
  selectedGenres = new Set(allGenres);
  document.querySelectorAll('#genre-list input').forEach(cb => cb.checked = true);
  render();
}

function genreSelectNone() {
  selectedGenres.clear();
  document.querySelectorAll('#genre-list input').forEach(cb => cb.checked = false);
  render();
}

function genreInvert() {
  const inverted = new Set(allGenres.filter(g => !selectedGenres.has(g)));
  selectedGenres = inverted;
  document.querySelectorAll('#genre-list input').forEach(cb => {
    const g = cb.nextSibling.textContent;
    cb.checked = selectedGenres.has(g);
  });
  render();
}

function initRatingSlider() {
  const minEl = document.getElementById('rating-min');
  const maxEl = document.getElementById('rating-max');
  const fillEl = document.getElementById('range-fill');
  const minLbl = document.getElementById('rating-min-label');
  const maxLbl = document.getElementById('rating-max-label');

  function updateFill() {
    const lo = parseFloat(minEl.value);
    const hi = parseFloat(maxEl.value);
    const pctLo = (lo / 10) * 100;
    const pctHi = (hi / 10) * 100;
    fillEl.style.left = pctLo + '%';
    fillEl.style.width = (pctHi - pctLo) + '%';
    minLbl.textContent = lo.toFixed(1);
    maxLbl.textContent = hi.toFixed(1);
  }

  minEl.addEventListener('input', () => {
    if (parseFloat(minEl.value) > parseFloat(maxEl.value)) minEl.value = maxEl.value;
    ratingMin = parseFloat(minEl.value);
    updateFill();
    render();
  });

  maxEl.addEventListener('input', () => {
    if (parseFloat(maxEl.value) < parseFloat(minEl.value)) maxEl.value = minEl.value;
    ratingMax = parseFloat(maxEl.value);
    updateFill();
    render();
  });

  updateFill();
}

// ── Enrich (OMDb) ────────────────────────────────────────────────────────────

function needsEnrichment(m) {
  // If IMDB link exists (real URL or N/A marker), don't show button
  if (m.props.imdb) return false;
  return !m.props.rating || !m.props.genres || !m.props.director ||
         !m.props.year || !m.props.country || !m.props.synopsis || !m.props.duration;
}

let _omdbKeyCache = null;

async function getOmdbKey() {
  if (_omdbKeyCache) return _omdbKeyCache;

  // When running locally, read from server (which reads OMDB_API_KEY env var)
  if (isLocalHost) {
    try {
      const resp = await fetch('/api/omdb-key');
      const data = await resp.json();
      if (data.key) { _omdbKeyCache = data.key; return data.key; }
    } catch {}
  }

  // Fallback: check localStorage, then prompt
  let key = localStorage.getItem('omdb_api_key');
  if (!key) {
    key = prompt('Enter your OMDb API key (get one free at omdbapi.com/apikey.aspx):');
    if (key) localStorage.setItem('omdb_api_key', key.trim());
  }
  _omdbKeyCache = key ? key.trim() : null;
  return _omdbKeyCache;
}

async function enrichMovie(btn, m) {
  const key = await getOmdbKey();
  if (!key) return;

  btn.disabled = true;
  btn.textContent = 'Fetching…';

  try {
    // Search OMDb by title
    const searchResp = await fetch(`https://www.omdbapi.com/?apikey=${encodeURIComponent(key)}&s=${encodeURIComponent(m.title)}&type=movie`);
    const searchData = await searchResp.json();

    if (searchData.Response === 'False') {
      const errMsg = (searchData.Error || '').toLowerCase();
      if (errMsg.includes('limit') || errMsg.includes('unauthorized')) {
        btn.textContent = 'API limit reached — try later';
        btn.disabled = false;
        return;
      }
      if (isLocalHost) {
        // Mark as N/A so we don't retry
        try {
          await fetch('/api/enrich', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: m.title, indent: m.indent, properties: [], cast: [], imdb_url: 'N/A' }),
          });
        } catch {}
      }
      btn.textContent = 'Not found on IMDb';
      btn.style.color = 'var(--txt2)';
      return;
    }

    const results = searchData.Search || [];
    // Auto-match: exact title or single result, prefer year match
    let match = results[0];
    if (m.props.year) {
      const yearMatch = results.find(r => r.Year === m.props.year);
      if (yearMatch) match = yearMatch;
    }
    const exact = results.find(r => r.Title.toLowerCase() === m.title.toLowerCase());
    if (exact) match = exact;

    // Fetch full details
    const detResp = await fetch(`https://www.omdbapi.com/?apikey=${encodeURIComponent(key)}&i=${match.imdbID}&plot=short`);
    const d = detResp.ok ? await detResp.json() : null;

    if (!d || d.Response === 'False') {
      btn.textContent = 'Details unavailable';
      return;
    }

    // Build the result display
    const detail = btn.closest('.mv-detail');
    const resultDiv = document.createElement('div');
    resultDiv.className = 'enrich-result';

    const na = v => v && v !== 'N/A' ? v : null;
    const fields = [
      ['Year', na(d.Year)],
      ['Rating', na(d.imdbRating) ? d.imdbRating + '/10' : null],
      ['Genres', na(d.Genre)],
      ['Country', na(d.Country)],
      ['Duration', na(d.Runtime)],
      ['Released', na(d.Released)],
      ['Director', na(d.Director)],
      ['Synopsis', na(d.Plot)],
      ['Cast', na(d.Actors)],
    ].filter(([,v]) => v);

    let gridHtml = '<div class="dg">';
    for (const [k, v] of fields)
      gridHtml += `<div class="dk">${esc(k)}</div><div class="dv">${esc(v)}</div>`;
    gridHtml += '</div>';

    // Build loglog text for movies.log
    const indent = ' '.repeat(m.indent + 4);
    let logLines = [];
    for (const [k, v] of fields) {
      if (k === 'Cast') {
        logLines.push(`${indent}- Cast (IMDb):`);
        for (const actor of v.split(',').slice(0, 5))
          logLines.push(`${indent}    - ${actor.trim()}`);
      } else {
        logLines.push(`${indent}- ${k}: ${v} (IMDb)`);
      }
    }
    if (d.imdbID) {
      logLines.push(`${indent}- IMDB: https://www.imdb.com/title/${d.imdbID}/`);
    }
    const logText = logLines.join('\n');

    // IMDB link
    const imdbUrl = d.imdbID ? `https://www.imdb.com/title/${d.imdbID}/` : null;
    const imdbLinkHtml = imdbUrl ? `<a class="imdb-link" href="${esc(imdbUrl)}" target="_blank" rel="noopener">View on IMDB ↗</a>` : '';

    // Build structured payload for the local API
    const apiPayload = {
      title: m.title,
      indent: m.indent,
      properties: fields.filter(([k]) => k !== 'Cast').map(([k, v]) => ({ key: k, value: v + ' (IMDb)' })),
      cast: na(d.Actors) ? d.Actors.split(',').slice(0, 5).map(a => a.trim()) : [],
      imdb_url: imdbUrl,
    };

    if (isLocalHost) {
      // Local: auto-save, show result without raw loglog or copy button
      resultDiv.innerHTML = `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--acc);font-weight:600;margin-bottom:6px">
          IMDb: ${esc(d.Title)} (${esc(d.Year || '')})
        </div>
        ${gridHtml}
        ${imdbLinkHtml}
        <div class="enrich-copy"><span class="copied">Saving…</span></div>`;
      resultDiv.dataset.payload = JSON.stringify(apiPayload);
      btn.replaceWith(resultDiv);

      // Auto-save
      try {
        const resp = await fetch('/api/enrich', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(apiPayload),
        });
        const saveData = await resp.json();
        const msg = resultDiv.querySelector('.copied');
        if (resp.ok && saveData.ok) {
          msg.textContent = `Saved (${saveData.added} lines added)`;
          msg.style.color = 'var(--green)';
        } else {
          msg.textContent = saveData.error || 'Save failed';
          msg.style.color = 'var(--red)';
        }
      } catch (saveErr) {
        const msg = resultDiv.querySelector('.copied');
        msg.textContent = 'Save failed: ' + saveErr.message;
        msg.style.color = 'var(--red)';
      }
    } else {
      // GitHub Pages: show copy button and raw loglog
      resultDiv.innerHTML = `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--acc);font-weight:600;margin-bottom:6px">
          IMDb: ${esc(d.Title)} (${esc(d.Year || '')})
        </div>
        ${gridHtml}
        ${imdbLinkHtml}
        <div class="enrich-copy">
          <button onclick="copyEnrich(this)">Copy</button>
          <span class="copied"></span>
        </div>
        <div class="enrich-pre">${esc(logText)}</div>`;
      resultDiv.querySelector('.enrich-pre').dataset.text = logText;
      btn.replaceWith(resultDiv);
    }

  } catch (err) {
    btn.textContent = 'Error: ' + err.message;
    btn.disabled = false;
  }
}

function copyEnrich(btn) {
  const pre = btn.closest('.enrich-result').querySelector('.enrich-pre');
  navigator.clipboard.writeText(pre.dataset.text).then(() => {
    const msg = btn.closest('.enrich-copy').querySelector('.copied');
    msg.textContent = 'Copied!';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  });
}


// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const text = await fetchMoviesLog();
    window.__moviesText = text;
    data = parseLog(text);

    collectGenres();
    initRatingSlider();
    renderTabs();
    render();

    // Compute sticky offsets from actual header heights
    requestAnimationFrame(() => {
      const hdrH = document.getElementById('hdr').offsetHeight;
      document.documentElement.style.setProperty('--hdr-h', hdrH + 'px');
      // sec-hdr height: measure first one or use default
      const secHdr = document.querySelector('.sec-hdr');
      const secH = secHdr ? secHdr.offsetHeight : 40;
      document.documentElement.style.setProperty('--hdr-sec-h', (hdrH + secH) + 'px');
    });

    document.getElementById('search').addEventListener('input', e => {
      sq = e.target.value.trim();
      render();
    });


  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="center err">Failed to load movies.log: ${esc(err.message)}</div>`;
  }
}

// ── Edit-mode lock (login → redirect to /movie-writer/) ─────────────────────

// Bridge for edit-online.js: refresh the viewer with a mutated movies.log.
window.__refreshMoviesText = (newText) => {
  data = parseLog(newText);
  movieMap.clear();
  movieIdCounter = 0;
  collectGenres();
  initRatingSlider();
  renderTabs();
  render();
  window.__moviesText = newText;
};

init();
</script>
<script type="module" src="edit-online.js"></script>
