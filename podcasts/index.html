<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcasts</title>
<link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/base.css">
<link rel="stylesheet" href="../shared/loglog-viewer.css">
<script src="https://k1monfared.github.io/site_kit/js/theme.js"></script>
</head>
<body>
<div id="app"></div>
<script src="../shared/loglog-viewer.js"></script>
<script src="../shared/loglog-editor.js"></script>
<script>
const app = document.getElementById('app');
const TIERS = [
  'I highly recommend',
  'I recommend',
  "There's something in it",
  'Good entertainment/fun and/or story telling is nice',
  "I've listened",
  'Not a good one',
  'I highly discourage',
  'lost interest, not for me',
  'listening list',
];
createLoglogViewer(app, {
  title: 'Podcasts',
  dataFile: '../podcasts.log',
  checkboxes: false,
  tiers: TIERS,
  summaryField: 'by',
  reviewFields: ['review'],
});
createLoglogEditor(app, {
  dataFile: 'podcasts.log',
  commitPrefix: 'podcasts',
  tiers: TIERS,
  reviewKey: 'review',
});
</script>
</body>
</html>
