<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/notes/blog/">
  <title>{{title}}</title>
  <link rel="stylesheet" href="static/style.css">
  <link rel="stylesheet" href="static/edit-online.css">
  <link rel="alternate" type="application/rss+xml" title="Blog RSS Feed" href="feed.xml">
  <script src="static/theme.js"></script>
  <script src="static/pagination.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <a href="./">Blog</a>
      <nav>
        <button id="tag-sidebar-toggle" aria-label="Tags" title="Tags">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor"/></svg>
        </button>
        <button id="timeline-sidebar-toggle" aria-label="Timeline" title="Timeline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button id="edit-lock" aria-label="Edit mode" title="Edit mode">
          <svg class="lock-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="lock-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
        </button>
        <button id="theme-toggle" aria-label="Toggle theme"></button>
        <a href="feed.xml" class="nav-icon" aria-label="RSS" title="RSS">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg>
        </a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{content}}
  </main>
  {{sidebar}}
  {{timeline_sidebar}}
  <footer>
    <div class="container">
      <!-- Giscus comments can be added here -->
    </div>
  </footer>
  <script src="static/sidebar.js"></script>
  <script src="static/lightbox.js"></script>
  <script src="static/post-nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="static/edit-online.js"></script>
</body>
</html>
